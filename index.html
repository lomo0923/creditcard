<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>信用卡帳單管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #0f1117;
  --surface:  #181b26;
  --card:     #1e2133;
  --border:   #2a2f4a;
  --gold:     #c9a84c;
  --teal:     #3ecfb2;
  --coral:    #e8635a;
  --pink:     #e86fa0;
  --blue:     #5b8ef0;
  --purple:   #a47cf0;
  --green:    #52c97a;
  --text:     #e8eaf0;
  --muted:    #6b7290;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Noto Sans TC', sans-serif;
  --r:        10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}

/* Header */
header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;
}
.logo{width:36px;height:36px;background:linear-gradient(135deg,#c9a84c,#e8d080);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
header h1{font-size:1rem;font-weight:700;}
header p{font-size:.7rem;color:var(--muted);margin-top:1px;}

/* Month nav */
.month-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:16px 20px 12px;}
.month-nav button{background:var(--card);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;font-size:1rem;cursor:pointer;transition:.15s;}
.month-nav button:hover{background:var(--border);}
.month-label{font-family:var(--mono);font-size:1.05rem;font-weight:600;color:var(--gold);min-width:140px;text-align:center;}

/* Layout */
main{max-width:880px;margin:0 auto;padding:0 14px;}

/* Totals bar */
.totals-bar{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  margin-bottom:16px;
}
.tot-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:13px 14px;
}
.tot-card.mine{border-color:#2a4060;background:linear-gradient(135deg,#1a2540,#1e2d4a);}
.tot-card .lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.tot-card .val{font-family:var(--mono);font-size:1.25rem;font-weight:600;color:var(--text);}
.tot-card.mine .val{color:var(--teal);}
.tot-card .sub{font-size:.68rem;color:var(--muted);margin-top:3px;}

/* Person summary pills */
.person-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.person-pill{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 16px;flex:1;min-width:150px;
}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;flex-shrink:0;}
.avatar.a{background:#2e2050;color:#b48cf0;}
.avatar.b{background:#1e3840;color:#4ecdc4;}
.pill-info .name{font-size:.82rem;font-weight:500;}
.pill-info .sub{font-size:.68rem;color:var(--muted);}
.pill-amt{font-family:var(--mono);font-size:1.1rem;font-weight:600;margin-left:auto;}
.pill-amt.a{color:#b48cf0;}
.pill-amt.b{color:#4ecdc4;}

/* Section title */
.sec{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* Bank table */
.bank-table{width:100%;border-collapse:separate;border-spacing:0 8px;}
.bank-table thead th{
  font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;
  padding:0 10px 4px;text-align:center;
}
.bank-table thead th:first-child{text-align:left;}

.bank-row{background:var(--card);border-radius:var(--r);}
.bank-row td{padding:0;vertical-align:top;}
.bank-row td:first-child{border-radius:var(--r) 0 0 var(--r);}
.bank-row td:last-child{border-radius:0 var(--r) var(--r) 0;}

/* Bank name cell */
.bank-name-cell{
  padding:14px 12px;
  display:flex;flex-direction:column;gap:4px;
  min-width:110px;border-right:1px solid var(--border);
}
.bank-dot{width:8px;height:8px;border-radius:50%;margin-right:6px;display:inline-block;}
.bank-name{font-size:.88rem;font-weight:600;display:flex;align-items:center;}
.bank-actions{display:flex;gap:6px;margin-top:6px;}
.btn-tiny{background:none;border:1px solid var(--border);color:var(--muted);font-size:.65rem;border-radius:5px;padding:2px 8px;cursor:pointer;transition:.15s;}
.btn-tiny:hover{color:var(--text);border-color:var(--text);}
.btn-tiny.danger:hover{color:var(--coral);border-color:var(--coral);}

/* Input cells */
.bank-row td.data-cell{padding:10px 10px;border-right:1px solid var(--border);min-width:90px;}
.bank-row td.data-cell:last-child{border-right:none;}

.field-wrap{display:flex;flex-direction:column;gap:3px;}
.field-label{font-size:.62rem;color:var(--muted);}
.field-input{
  background:var(--bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--mono);font-size:.85rem;
  padding:6px 10px;width:100%;outline:none;transition:.15s;
  text-align:right;
}
.field-input:focus{border-color:var(--gold);}
.field-input.paid{border-color:#2a5040;color:var(--green);}
.field-input.readonly{opacity:.5;cursor:default;}

/* Paid toggle */
.paid-cell{padding:10px 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;min-width:70px;}
.paid-toggle{
  width:28px;height:28px;border-radius:7px;border:2px solid var(--border);
  background:none;color:var(--muted);font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.paid-toggle.on{border-color:var(--green);background:#1e3a2e;color:var(--green);}
.paid-toggle:hover{border-color:var(--green);}
.paid-label{font-size:.62rem;color:var(--muted);}

/* Owe cell (computed) */
.owe-val{
  font-family:var(--mono);font-size:.9rem;font-weight:600;
  text-align:right;padding:0 4px;
}
.owe-val.zero{color:var(--green);}
.owe-val.pos{color:var(--coral);}

/* Installment rows */
.install-row{background:#1a1e30;border-radius:var(--r);margin-top:4px;}
.install-row td{padding:8px 10px;font-size:.78rem;}
.install-tag{
  display:inline-block;background:#1e2e50;color:var(--blue);
  border-radius:20px;padding:2px 8px;font-size:.68rem;font-family:var(--mono);
}

/* Add bank */
.add-bank-bar{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 14px;margin-bottom:8px;
}
.add-bank-bar input, .add-bank-bar select{
  background:var(--bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);font-family:var(--sans);font-size:.85rem;
  padding:7px 10px;outline:none;transition:.15s;
}
.add-bank-bar input:focus{border-color:var(--gold);}
.add-bank-bar input[type=text]{flex:1;min-width:120px;}
.add-bank-bar select{min-width:80px;}
.btn-gold{
  background:var(--gold);color:#1a1200;font-weight:700;font-size:.82rem;
  border:none;border-radius:7px;padding:8px 16px;cursor:pointer;white-space:nowrap;
  transition:opacity .15s;
}
.btn-gold:hover{opacity:.85;}

/* Loan section */
.loan-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;margin-bottom:10px;
}
.loan-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;}
.loan-grid .field-wrap{margin-bottom:0;}
.btn-del-loan{background:none;border:1px solid var(--border);color:var(--coral);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:.8rem;transition:.15s;white-space:nowrap;}
.btn-del-loan:hover{background:#2a1a1a;}

/* Grand total table */
.grand-section{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;margin-top:8px;
}
.grand-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.grand-row:last-child{border-bottom:none;padding-top:12px;}
.grand-row .glabel{font-size:.82rem;color:var(--muted);}
.grand-row .gval{font-family:var(--mono);font-size:1rem;font-weight:600;}
.grand-row.total .glabel{font-size:.9rem;color:var(--text);font-weight:700;}
.grand-row.total .gval{font-size:1.3rem;color:var(--coral);}
.grand-row.mine-row .glabel{font-size:.9rem;color:var(--teal);}
.grand-row.mine-row .gval{font-size:1.3rem;color:var(--teal);}

/* Name editor */
.name-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.name-row .field-wrap{flex:1;min-width:120px;}
.name-row .field-input{text-align:left;}

/* Color dots */
.c0{background:#5b8ef0;} .c1{background:#e86fa0;} .c2{background:#52c97a;}
.c3{background:#f0a23c;} .c4{background:#a47cf0;} .c5{background:#3ecfb2;}
.c6{background:#e8635a;} .c7{background:#c9a84c;} .c8{background:#7090f0;}

@media(max-width:640px){
  .totals-bar{grid-template-columns:1fr 1fr;}
  .bank-table,.bank-table tbody,.bank-table tr,.bank-table td{display:block;width:100%!important;}
  .bank-row td.data-cell{border-right:none;border-top:1px solid var(--border);}
  .paid-cell{flex-direction:row;justify-content:flex-start;}
  .loan-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<header>
  <div class="logo">💳</div>
  <div>
    <h1>信用卡帳單管理</h1>
    <p>多家銀行 · 分期 · A/B 分攤</p>
  </div>
</header>

<!-- Month Nav -->
<div class="month-nav">
  <button id="prevM">◀</button>
  <div class="month-label" id="monthLabel"></div>
  <button id="nextM">▶</button>
</div>

<main>

<!-- Totals bar -->
<div class="totals-bar">
  <div class="tot-card">
    <div class="lbl">信用卡總計</div>
    <div class="val" id="gt_cc">$0</div>
    <div class="sub" id="gt_cc_sub">0 家銀行</div>
  </div>
  <div class="tot-card">
    <div class="lbl">分期總額</div>
    <div class="val" id="gt_inst">$0</div>
    <div class="sub" id="gt_inst_sub">0 筆分期</div>
  </div>
  <div class="tot-card">
    <div class="lbl">含貸款總計</div>
    <div class="val" id="gt_all">$0</div>
    <div class="sub">信用卡＋貸款</div>
  </div>
  <div class="tot-card mine">
    <div class="lbl">我需付</div>
    <div class="val" id="gt_mine">$0</div>
    <div class="sub" id="gt_mine_sub">扣除A、B分攤</div>
  </div>
</div>

<!-- Person pills -->
<div class="person-bar">
  <div class="person-pill">
    <div class="avatar a" id="av_a">A</div>
    <div class="pill-info">
      <div class="name" id="pname_a">A 人物</div>
      <div class="sub">應付分攤</div>
    </div>
    <div class="pill-amt a" id="pamt_a">$0</div>
  </div>
  <div class="person-pill">
    <div class="avatar b" id="av_b">B</div>
    <div class="pill-info">
      <div class="name" id="pname_b">B 人物</div>
      <div class="sub">應付分攤</div>
    </div>
    <div class="pill-amt b" id="pamt_b">$0</div>
  </div>
</div>

<!-- Name settings -->
<div class="sec">人物名稱設定</div>
<div class="name-row">
  <div class="field-wrap">
    <div class="field-label">A 人物名稱</div>
    <input class="field-input" id="in_nameA" type="text" placeholder="例：老公" maxlength="10"/>
  </div>
  <div class="field-wrap">
    <div class="field-label">B 人物名稱</div>
    <input class="field-input" id="in_nameB" type="text" placeholder="例：室友" maxlength="10"/>
  </div>
  <div class="field-wrap" style="max-width:100px;justify-content:flex-end;display:flex;align-items:flex-end;">
    <button class="btn-gold" id="saveNames">儲存</button>
  </div>
</div>

<!-- Credit Cards -->
<div class="sec">信用卡帳單</div>

<!-- Add bank -->
<div class="add-bank-bar">
  <input type="text" id="in_bankName" placeholder="銀行名稱（例：富邦）" maxlength="15"/>
  <select id="in_bankColor">
    <option value="c0">🔵 藍</option>
    <option value="c1">🩷 粉</option>
    <option value="c2">🟢 綠</option>
    <option value="c3">🟠 橙</option>
    <option value="c4">🟣 紫</option>
    <option value="c5">🩵 青</option>
    <option value="c6">🔴 紅</option>
    <option value="c7">🟡 金</option>
  </select>
  <button class="btn-gold" id="btnAddBank">＋ 新增銀行</button>
</div>

<div id="bankTable"></div>

<!-- Loans -->
<div class="sec">貸款 / 其他固定支出</div>
<div id="loanList"></div>
<div class="add-bank-bar">
  <input type="text" id="in_loanName" placeholder="名稱（例：學貸）" maxlength="15"/>
  <div class="field-wrap" style="flex:1;margin:0;">
    <input class="field-input" id="in_loanAmt" type="number" placeholder="月繳金額" min="0" style="min-width:100px;"/>
  </div>
  <button class="btn-gold" id="btnAddLoan">＋ 新增貸款</button>
</div>

<!-- Grand total -->
<div class="sec">本月總覽</div>
<div class="grand-section" id="grandSection"></div>

</main>

<script>
// ── Storage helpers ──────────────────────────────────
const SK = 'cct2_';
function mk(y,m){return `${SK}${y}_${m}`;}
function ld(y,m){try{return JSON.parse(localStorage.getItem(mk(y,m)))||initMonth();}catch{return initMonth();}}
function sv(y,m,d){localStorage.setItem(mk(y,m),JSON.stringify(d));}
function ldGlobal(){try{return JSON.parse(localStorage.getItem(SK+'global'))||{names:{a:'A 人物',b:'B 人物'},banks:[],bankColors:{}};}catch{return {names:{a:'A 人物',b:'B 人物'},banks:[],bankColors:{}};}}
function svGlobal(g){localStorage.setItem(SK+'global',JSON.stringify(g));}

function initMonth(){return {cards:{},loans:[]};}

// cards[bankId] = {total, amountA, amountB, paid, installments:[{desc,total,months,monthly,amountA,amountB}]}
// loans = [{id,name,amount,paid}]

// ── State ────────────────────────────────────────────
let Y = new Date().getFullYear();
let M = new Date().getMonth();
let G = ldGlobal();
let D = ld(Y,M);

const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const fmt = n => '$'+(Math.round(n)||0).toLocaleString('zh-TW');
const uid = ()=>Math.random().toString(36).slice(2,8);

// ── Month nav ────────────────────────────────────────
document.getElementById('prevM').onclick=()=>{
  M--;if(M<0){M=11;Y--;}
  D=ld(Y,M);render();
};
document.getElementById('nextM').onclick=()=>{
  M++;if(M>11){M=0;Y++;}
  D=ld(Y,M);render();
};

// ── Names ────────────────────────────────────────────
document.getElementById('saveNames').onclick=()=>{
  const a=document.getElementById('in_nameA').value.trim();
  const b=document.getElementById('in_nameB').value.trim();
  if(a)G.names.a=a;
  if(b)G.names.b=b;
  svGlobal(G);
  render();
};

// ── Add bank ─────────────────────────────────────────
document.getElementById('btnAddBank').onclick=()=>{
  const name=document.getElementById('in_bankName').value.trim();
  if(!name)return;
  const color=document.getElementById('in_bankColor').value;
  const id=uid();
  G.banks.push({id,name,color});
  svGlobal(G);
  document.getElementById('in_bankName').value='';
  render();
};

// ── Add loan ─────────────────────────────────────────
document.getElementById('btnAddLoan').onclick=()=>{
  const name=document.getElementById('in_loanName').value.trim();
  const amount=parseFloat(document.getElementById('in_loanAmt').value)||0;
  if(!name||!amount)return;
  if(!D.loans)D.loans=[];
  D.loans.push({id:uid(),name,amount,paid:false});
  sv(Y,M,D);
  document.getElementById('in_loanName').value='';
  document.getElementById('in_loanAmt').value='';
  render();
};

// ── Input helper (debounced save) ─────────────────────
function bindInput(el, cb){
  el.addEventListener('input',()=>{cb(el.value);sv(Y,M,D);renderTotals();});
}

// ── RENDER ────────────────────────────────────────────
function render(){
  updateMonthLabel();
  renderNames();
  renderBanks();
  renderLoans();
  renderTotals();
}

function updateMonthLabel(){
  document.getElementById('monthLabel').textContent=`${Y} 年 ${MONTHS[M]}`;
}

function renderNames(){
  document.getElementById('in_nameA').value=G.names.a;
  document.getElementById('in_nameB').value=G.names.b;
  document.getElementById('pname_a').textContent=G.names.a;
  document.getElementById('pname_b').textContent=G.names.b;
  document.getElementById('av_a').textContent=G.names.a[0];
  document.getElementById('av_b').textContent=G.names.b[0];
  // update label tooltips in table if any
  document.querySelectorAll('.lbl-a').forEach(e=>e.textContent=G.names.a+'分攤');
  document.querySelectorAll('.lbl-b').forEach(e=>e.textContent=G.names.b+'分攤');
}

function renderBanks(){
  if(!D.cards)D.cards={};
  const wrap=document.getElementById('bankTable');
  if(!G.banks.length){
    wrap.innerHTML='<p style="color:var(--muted);font-size:.82rem;padding:8px 4px;">尚未新增銀行，請在上方輸入後點「＋ 新增銀行」</p>';
    return;
  }
  wrap.innerHTML='';
  G.banks.forEach((bank,bi)=>{
    if(!D.cards[bank.id])D.cards[bank.id]={total:0,amountA:0,amountB:0,paid:false,installments:[]};
    const c=D.cards[bank.id];
    const div=document.createElement('div');
    div.style.marginBottom='10px';
    div.innerHTML=bankHTML(bank,bi,c);
    wrap.appendChild(div);
    // Bind inputs
    bindInput(div.querySelector('.inp-total'),  v=>{c.total=parseFloat(v)||0;});
    bindInput(div.querySelector('.inp-a'),      v=>{c.amountA=parseFloat(v)||0;});
    bindInput(div.querySelector('.inp-b'),      v=>{c.amountB=parseFloat(v)||0;});
    // Paid toggle
    div.querySelector('.paid-toggle').onclick=function(){
      c.paid=!c.paid;
      this.classList.toggle('on',c.paid);
      this.textContent=c.paid?'✓':'—';
      sv(Y,M,D);renderTotals();
    };
    // Add installment
    div.querySelector('.btn-add-inst').onclick=()=>{
      if(!c.installments)c.installments=[];
      c.installments.push({id:uid(),desc:'',total:0,months:0,monthly:0,amountA:0,amountB:0});
      sv(Y,M,D);renderBanks();
    };
    // Delete bank
    div.querySelector('.btn-del-bank').onclick=()=>{
      if(!confirm(`確定刪除「${bank.name}」？`))return;
      G.banks.splice(bi,1);
      delete D.cards[bank.id];
      svGlobal(G);sv(Y,M,D);renderBanks();renderTotals();
    };
    // Installment rows
    (c.installments||[]).forEach((inst,ii)=>{
      const irow=div.querySelector(`.irow-${inst.id}`);
      if(!irow)return;
      irow.querySelector('.inst-desc').addEventListener('input',e=>{inst.desc=e.target.value;sv(Y,M,D);});
      const inTotal=irow.querySelector('.inst-total');
      const inMonths=irow.querySelector('.inst-months');
      const inMonthly=irow.querySelector('.inst-monthly');
      const calcM=()=>{
        const t=parseFloat(inTotal.value)||0;
        const mo=parseInt(inMonths.value)||0;
        inst.total=t;inst.months=mo;
        if(mo>0&&t>0){inst.monthly=Math.ceil(t/mo);inMonthly.value=inst.monthly;}
        else{inst.monthly=0;inMonthly.value='';}
        sv(Y,M,D);renderTotals();
      };
      inTotal.addEventListener('input',calcM);
      inMonths.addEventListener('input',calcM);
      irow.querySelector('.inst-a').addEventListener('input',e=>{inst.amountA=parseFloat(e.target.value)||0;sv(Y,M,D);renderTotals();});
      irow.querySelector('.inst-b').addEventListener('input',e=>{inst.amountB=parseFloat(e.target.value)||0;sv(Y,M,D);renderTotals();});
      irow.querySelector('.btn-del-inst').onclick=()=>{
        c.installments.splice(ii,1);
        sv(Y,M,D);renderBanks();renderTotals();
      };
    });
  });
}

function bankHTML(bank,bi,c){
  const paid=c.paid;
  const instRows=(c.installments||[]).map(inst=>instHTML(bank,inst)).join('');
  return `
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;">
    <!-- Bank header row -->
    <div style="display:flex;align-items:stretch;flex-wrap:wrap;">
      <!-- Name -->
      <div style="padding:12px 14px;min-width:110px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:space-between;gap:8px;">
        <div style="display:flex;align-items:center;gap:7px;">
          <span class="bank-dot ${bank.color}"></span>
          <span style="font-size:.9rem;font-weight:600;">${bank.name}</span>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn-tiny btn-add-inst">＋ 分期</button>
          <button class="btn-tiny danger btn-del-bank">刪除</button>
        </div>
      </div>
      <!-- Total -->
      <div style="padding:10px 10px;border-right:1px solid var(--border);min-width:100px;flex:1;">
        <div class="field-wrap">
          <div class="field-label">信用卡總額</div>
          <input class="field-input inp-total ${paid?'paid':''}" type="number" min="0"
            value="${c.total||''}" placeholder="0"/>
        </div>
      </div>
      <!-- A -->
      <div style="padding:10px 10px;border-right:1px solid var(--border);min-width:100px;flex:1;">
        <div class="field-wrap">
          <div class="field-label lbl-a">${G.names.a}分攤</div>
          <input class="field-input inp-a" type="number" min="0"
            value="${c.amountA||''}" placeholder="0"/>
        </div>
      </div>
      <!-- B -->
      <div style="padding:10px 10px;border-right:1px solid var(--border);min-width:100px;flex:1;">
        <div class="field-wrap">
          <div class="field-label lbl-b">${G.names.b}分攤</div>
          <input class="field-input inp-b" type="number" min="0"
            value="${c.amountB||''}" placeholder="0"/>
        </div>
      </div>
      <!-- My owe -->
      <div style="padding:10px 10px;border-right:1px solid var(--border);min-width:90px;flex:1;display:flex;flex-direction:column;justify-content:center;">
        <div class="field-label">我需付</div>
        <div class="owe-val ${((c.total||0)-(c.amountA||0)-(c.amountB||0))===0?'zero':'pos'}"
          id="owe_${bank.id}">
          ${fmt((c.total||0)-(c.amountA||0)-(c.amountB||0))}
        </div>
      </div>
      <!-- Paid -->
      <div style="padding:10px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-width:64px;">
        <button class="paid-toggle ${paid?'on':''}">${paid?'✓':'—'}</button>
        <div class="field-label">${paid?'已繳':'應繳'}</div>
      </div>
    </div>
    ${instRows?`<div style="border-top:1px solid var(--border);background:#181b26;padding:0 10px 10px;">${instRows}</div>`:''}
  </div>`;
}

function instHTML(bank,inst){
  return `
  <div class="irow-${inst.id}" style="margin-top:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span class="install-tag">分期</span>
      <input class="inst-desc field-input" type="text" placeholder="分期說明（例：iPhone）"
        value="${inst.desc||''}" style="flex:1;text-align:left;font-family:var(--sans);font-size:.8rem;"/>
      <button class="btn-del-inst btn-tiny danger">✕</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <div class="field-wrap" style="flex:1;min-width:80px;">
        <div class="field-label">總金額</div>
        <input class="inst-total field-input" type="number" min="0" value="${inst.total||''}" placeholder="0"/>
      </div>
      <div class="field-wrap" style="flex:1;min-width:60px;">
        <div class="field-label">期數</div>
        <input class="inst-months field-input" type="number" min="2" max="60" value="${inst.months||''}" placeholder="12"/>
      </div>
      <div class="field-wrap" style="flex:1;min-width:80px;">
        <div class="field-label">每月</div>
        <input class="inst-monthly field-input readonly" type="number" readonly value="${inst.monthly||''}" placeholder="自動"/>
      </div>
      <div class="field-wrap" style="flex:1;min-width:80px;">
        <div class="field-label lbl-a">${G.names.a}分攤</div>
        <input class="inst-a field-input" type="number" min="0" value="${inst.amountA||''}" placeholder="0"/>
      </div>
      <div class="field-wrap" style="flex:1;min-width:80px;">
        <div class="field-label lbl-b">${G.names.b}分攤</div>
        <input class="inst-b field-input" type="number" min="0" value="${inst.amountB||''}" placeholder="0"/>
      </div>
    </div>
  </div>`;
}

function renderLoans(){
  if(!D.loans)D.loans=[];
  const wrap=document.getElementById('loanList');
  wrap.innerHTML='';
  D.loans.forEach((loan,i)=>{
    const div=document.createElement('div');
    div.className='loan-card';
    div.innerHTML=`
      <div class="loan-grid">
        <div class="field-wrap">
          <div class="field-label">名稱</div>
          <input class="field-input" type="text" value="${loan.name}" maxlength="15"/>
        </div>
        <div class="field-wrap">
          <div class="field-label">月繳金額</div>
          <input class="field-input" type="number" min="0" value="${loan.amount||''}"/>
        </div>
        <div class="field-wrap">
          <div class="field-label">狀態</div>
          <button class="paid-toggle ${loan.paid?'on':''}" style="width:auto;padding:0 14px;height:34px;border-radius:7px;">
            ${loan.paid?'✓ 已繳':'— 未繳'}
          </button>
        </div>
        <button class="btn-del-loan">刪除</button>
      </div>`;
    // bind
    div.querySelectorAll('input')[0].addEventListener('input',e=>{loan.name=e.target.value;sv(Y,M,D);});
    div.querySelectorAll('input')[1].addEventListener('input',e=>{loan.amount=parseFloat(e.target.value)||0;sv(Y,M,D);renderTotals();});
    div.querySelector('.paid-toggle').onclick=function(){
      loan.paid=!loan.paid;
      this.classList.toggle('on',loan.paid);
      this.textContent=loan.paid?'✓ 已繳':'— 未繳';
      sv(Y,M,D);renderTotals();
    };
    div.querySelector('.btn-del-loan').onclick=()=>{
      D.loans.splice(i,1);sv(Y,M,D);renderLoans();renderTotals();
    };
    wrap.appendChild(div);
  });
}

function renderTotals(){
  if(!D.cards)D.cards={};
  let ccTotal=0,ccOweA=0,ccOweB=0,instTotal=0,instCount=0;
  G.banks.forEach(bank=>{
    const c=D.cards[bank.id]||{};
    const t=c.total||0,a=c.amountA||0,b=c.amountB||0;
    ccTotal+=t;ccOweA+=a;ccOweB+=b;
    // update per-bank owe cell
    const el=document.getElementById('owe_'+bank.id);
    if(el){const v=t-a-b;el.textContent=fmt(v);el.className='owe-val '+(v===0?'zero':'pos');}
    (c.installments||[]).forEach(inst=>{
      if(inst.total>0){instTotal+=inst.total;instCount++;}
      ccOweA+=inst.amountA||0;
      ccOweB+=inst.amountB||0;
    });
  });
  const loanTotal=(D.loans||[]).reduce((s,l)=>s+(l.amount||0),0);
  const allTotal=ccTotal+loanTotal;
  const mine=allTotal-ccOweA-ccOweB;

  document.getElementById('gt_cc').textContent=fmt(ccTotal);
  document.getElementById('gt_cc_sub').textContent=`${G.banks.length} 家銀行`;
  document.getElementById('gt_inst').textContent=fmt(instTotal);
  document.getElementById('gt_inst_sub').textContent=`${instCount} 筆分期`;
  document.getElementById('gt_all').textContent=fmt(allTotal);
  document.getElementById('gt_mine').textContent=fmt(Math.max(mine,0));
  document.getElementById('gt_mine_sub').textContent=`總額 ${fmt(allTotal)} − A ${fmt(ccOweA)} − B ${fmt(ccOweB)}`;
  document.getElementById('pamt_a').textContent=fmt(ccOweA);
  document.getElementById('pamt_b').textContent=fmt(ccOweB);

  // Grand section
  const paidCC=G.banks.filter(b=>(D.cards[b.id]||{}).paid).reduce((s,b)=>s+(D.cards[b.id].total||0),0);
  const unpaidCC=ccTotal-paidCC;
  const paidLoan=(D.loans||[]).filter(l=>l.paid).reduce((s,l)=>s+(l.amount||0),0);
  const gs=document.getElementById('grandSection');
  gs.innerHTML=`
    <div class="grand-row"><span class="glabel">信用卡合計</span><span class="gval">${fmt(ccTotal)}</span></div>
    <div class="grand-row"><span class="glabel" style="color:var(--green);">已繳信用卡</span><span class="gval" style="color:var(--green);">${fmt(paidCC)}</span></div>
    <div class="grand-row"><span class="glabel" style="color:var(--coral);">應繳信用卡</span><span class="gval" style="color:var(--coral);">${fmt(unpaidCC)}</span></div>
    <div class="grand-row"><span class="glabel">貸款合計</span><span class="gval">${fmt(loanTotal)}</span></div>
    <div class="grand-row"><span class="glabel" style="color:var(--green);">已繳貸款</span><span class="gval" style="color:var(--green);">${fmt(paidLoan)}</span></div>
    <div class="grand-row"><span class="glabel">${G.names.a} 應付</span><span class="gval" style="color:#b48cf0;">${fmt(ccOweA)}</span></div>
    <div class="grand-row"><span class="glabel">${G.names.b} 應付</span><span class="gval" style="color:#4ecdc4;">${fmt(ccOweB)}</span></div>
    <div class="grand-row total"><span class="glabel">本月總計</span><span class="gval">${fmt(allTotal)}</span></div>
    <div class="grand-row mine-row"><span class="glabel">我需支付（扣除A、B）</span><span class="gval">${fmt(Math.max(mine,0))}</span></div>
  `;
}

// ── Init ──────────────────────────────────────────────
render();
</script>
</body>
</html>
